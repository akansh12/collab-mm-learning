# EuroSAT S1-RGB | fair paired baseline for data efficiency experiment
# Architecture identical to eurosat_joint_s1_rgb but single modality: all (S1+RGB concatenated, 5ch)
# Used to give an architecturally controlled paired upper bound vs. the joint method.
dataset: eurosat
training: joint
data_root: data/eurosat

model_name: eurosat_data_eff_paired
wandb_project: collab-mm-learning
use_wandb: false

modality: [all]
num_classes: 10
per_class_count: 100

backbone: cnn_backbone_resnet_groupbn
cnn_backbone_resnet_num_blocks: [2]
normalize_backbone: false
proj_type: cnn_proj_resnet
cnn_proj_resnet_num_blocks: [2, 2, 2]

loss_function: CrossEntropyLoss
optimizer_CLS: AdamW
lr_CLS: 0.001
weight_decay_CLS: 0.01
betas_CLS: [0.9, 0.999]
scheduler_CLS: step
step_size_CLS: 150
gamma_CLS: 0.1

num_epochs: 200
batch_size: 32
num_workers: 1
pin_memory: true
prefetch_factor: 2

save_model: true
save_after_epoch: 150
recompute_batchnorm: true
seed: 42
port: 12356
