# BigEarthNet-MM | BN calibration ablation | S1 + S2
# Identical to bge_joint_s1_s2.yaml but uses standard BatchNorm (not GroupBN)
# Purpose: cleanly test no-BN vs BN(train) vs BN(test) for rebuttal (7XmS R2)
dataset: bge
training: joint
data_root: data/bge

model_name: bge_bn_ablation_s1_s2
wandb_project: collab-mm-learning
use_wandb: false

modality: [s1, s2]
num_classes: 6
per_class_count: 100

backbone: cnn_backbone_resnet
cnn_backbone_resnet_num_blocks: [2, 2, 2]
normalize_backbone: false
proj_type: cnn_proj_resnet
cnn_proj_resnet_num_blocks: [2]

loss_function: CrossEntropyLoss
optimizer_CLS: AdamW
lr_CLS: 0.001
weight_decay_CLS: 0.01
betas_CLS: [0.9, 0.999]
scheduler_CLS: step
step_size_CLS: 150
gamma_CLS: 0.1

num_epochs: 200
batch_size: 32
num_workers: 1
pin_memory: true
prefetch_factor: 2

save_model: true
save_after_epoch: 190
recompute_batchnorm: true
seed: 42
port: 12346
