# Digits | joint | FMNIST + MNIST (Table 1)
dataset: digits
training: joint
data_root: data/digits

model_name: digits_joint_fmnist_mnist
wandb_project: collab-mm-learning
use_wandb: false

modality: [FMNIST, MNIST]
num_classes: 10
per_class_count: 50

backbone: cnn_backbone_resnet_groupbn
cnn_backbone_resnet_num_blocks: [2, 2, 2]
normalize_backbone: false
proj_type: cnn_proj_resnet
cnn_proj_resnet_num_blocks: [2]

loss_function: CrossEntropyLoss
optimizer_CLS: AdamW
lr_CLS: 0.001
weight_decay_CLS: 0.01
betas_CLS: [0.9, 0.999]
scheduler_CLS: step
step_size_CLS: 150
gamma_CLS: 0.1

num_epochs: 200
batch_size: 32
num_workers: 4
pin_memory: true
prefetch_factor: 2

save_model: true
save_after_epoch: 190
recompute_batchnorm: true
seed: 42
port: 12404
